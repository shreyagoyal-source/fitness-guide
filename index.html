<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shreya — Visual Workout Guide</title>
<style>
  :root{
    --navy:#0d1424; --navy2:#1F3A5F; --teal:#2A9D8F; --teal-soft:#e2f1ef;
    --ink:#1a1f2b; --muted:#6b7280; --gold:#b8860b; --cream:#f7f1e6;
    --card:#fbfbfc; --line:#ececf0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:#eef0f3;color:var(--ink)}
  .wrap{max-width:560px;margin:0 auto;background:#fff;min-height:100vh;
        box-shadow:0 0 40px rgba(0,0,0,.08)}
  header{background:var(--navy);color:#fff;padding:26px 22px 0}
  header h1{margin:0 0 16px;font-size:30px;font-weight:800;letter-spacing:-.5px}
  .tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;background:none;border:none;color:#8a93a6;cursor:pointer;
       padding:12px 16px 14px;border-radius:12px 12px 0 0;text-align:center;font-family:inherit;
       transition:.15s}
  .tab .d{font-size:15px;font-weight:800;letter-spacing:.5px}
  .tab .s{font-size:13px;margin-top:2px;font-weight:500}
  .tab.active{background:#fff;color:var(--navy)}
  .tab.active .s{color:var(--teal)}
  .panel{display:none;padding:22px 18px 40px;animation:fade .25s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .dayhead{display:flex;gap:14px;align-items:flex-start;margin:4px 0 18px}
  .dayhead .bar{width:5px;border-radius:4px;background:var(--teal);align-self:stretch;min-height:46px}
  .dayhead h2{margin:0;font-size:26px;font-weight:800}
  .dayhead p{margin:5px 0 0;color:var(--muted);font-size:15px}
  .warm{background:var(--cream);border-left:5px solid var(--gold);border-radius:10px;
        padding:16px 18px;margin-bottom:22px}
  .warm .lbl{color:var(--gold);font-weight:800;font-size:12px;letter-spacing:1.5px;margin-bottom:6px}
  .warm .big{font-size:18px;font-weight:800}
  .warm .sub{color:var(--muted);font-size:14px;margin-top:5px}
  .card{display:flex;border:1px solid var(--line);border-radius:14px;margin-bottom:16px;
        overflow:hidden;background:var(--card)}
  .card .icon{flex:0 0 96px;background:var(--teal-soft);display:flex;align-items:center;
        justify-content:center;font-size:34px}
  .card .body{padding:16px 16px 16px 18px;flex:1;min-width:0}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .name{font-size:18px;font-weight:800;line-height:1.2}
  .card .cue{color:var(--muted);font-size:14.5px;margin-top:7px;line-height:1.35}
  .badge{flex:0 0 auto;background:var(--teal-soft);color:#1f7a70;font-weight:800;font-size:13px;
        padding:6px 12px;border-radius:20px;white-space:nowrap}
  .finisher .icon{background:#eaf0f6}
  .stretch{margin-top:6px;background:var(--navy2);color:#fff;border-radius:14px;padding:18px 20px}
  .stretch .lbl{font-size:12px;letter-spacing:1.5px;font-weight:800;color:#9fd6cf;margin-bottom:6px}
  .stretch .big{font-size:17px;font-weight:800}
  .stretch .sub{font-size:14px;color:#cfd6e2;margin-top:5px}
  .stretch a{color:#9fe0d8}
  .note{font-size:12.5px;color:var(--muted);text-align:center;padding:18px 24px 30px}
  @media(max-width:430px){
    header h1{font-size:25px}.card .icon{flex-basis:74px;font-size:28px}
    .dayhead h2{font-size:23px}.tab{padding:11px 12px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Visual Workout Guide</h1>
    <div class="tabs" id="tabs"></div>
  </header>
  <main id="main"></main>
  <div class="note">Shreya's plan · Mon–Fri training, Sunday recovery, dance daily · Planet Fitness LIC.
    Reps in the 10–15 range, light–moderate weight = lean &amp; toned, not bulky. Add weight only when the top
    rep feels easy. Keep any knee pain at or under 3/10.</div>
</div>

<script>
const stretch = {lbl:"COOL DOWN — EVERY SESSION", big:"15 min full-body stretch",
  sub:'Do it warm, after lifting. Your saved routine: <a href="https://youtu.be/g_tea8ZNk5A" target="_blank">youtu.be/g_tea8ZNk5A</a>'};
const warm = {lbl:"WARM-UP — EVERY SESSION", big:"5–10 min easy cardio + mobility",
  sub:"Jumping jacks, leg swings, arm circles, or a brisk incline treadmill walk. Get warm, not tired."};

const days = [
 {key:"MON", sub:"Core", title:"Core Day", meta:"5–10 min warm-up → 20–25 min strength · rest ≤45 sec",
  ex:[
   {i:"🔥",n:"Cable / Machine Crunch",c:"Hips stay fixed — only your spine curls.",r:"3 × 15"},
   {i:"🔥",n:"Captain's Chair Knee Raise",c:"Control the lift; don't swing the legs down.",r:"3 × 12"},
   {i:"🔥",n:"Cable Oblique Crunch",c:"Stand sideways to the cable, pull elbow toward hip.",r:"3 × 12 / side"},
   {i:"🧱",n:"Plank Hold",c:"Straight line head-to-heels, squeeze glutes.",r:"3 × 30 sec"},
  ]},
 {key:"TUE", sub:"Arms", title:"Arms Day", meta:"5–10 min warm-up → 20–25 min strength · rest ≤45 sec",
  ex:[
   {i:"💪",n:"Bicep Curl (machine / DB)",c:"Elbows pinned to your sides, no swinging.",r:"3 × 12"},
   {i:"🔥",n:"Tricep Pushdown (cable)",c:"Elbows tucked, push the rope/bar straight down.",r:"3 × 12"},
   {i:"🔥",n:"Overhead DB Extension",c:"One dumbbell behind your head, elbows point up.",r:"3 × 12"},
   {i:"💪",n:"Hammer Curl (DB)",c:"Palms face in, like holding a hammer.",r:"3 × 12"},
  ]},
 {key:"WED", sub:"Back", title:"Back Day + Cardio", meta:"5–10 min warm-up → 20–25 min strength + 10 min cardio",
  ex:[
   {i:"🔥",n:"Lat Pulldown",c:"Pull the wide bar to your chest, lead with elbows.",r:"3 × 12"},
   {i:"🔥",n:"Seated Cable Row",c:"Pull the handle to your belly, squeeze shoulder blades.",r:"3 × 12"},
   {i:"🔥",n:"Face Pull (cable)",c:"Rope to your face, elbows high — great for posture.",r:"3 × 15"},
   {i:"🚶‍♀️",n:"Incline Treadmill Walk",c:"Zone 2 — brisk but you can still talk. Fat-loss finisher.",r:"10 min", fin:true},
  ]},
 {key:"THU", sub:"Chest", title:"Chest + Shoulders", meta:"5–10 min warm-up → 20–25 min strength · rest ≤45 sec",
  ex:[
   {i:"🔥",n:"Chest Press Machine",c:"Push the handles forward, away from your chest.",r:"3 × 12"},
   {i:"🔥",n:"Pec Deck (Fly)",c:"Forearms on the pads, squeeze them together in front.",r:"3 × 12"},
   {i:"🔥",n:"Shoulder Press Machine",c:"Press the handles straight up overhead.",r:"3 × 12"},
   {i:"🏋️‍♀️",n:"Lateral Raise (DB)",c:"Light dumbbells out to a 'T' at shoulder height — toned shoulders.",r:"3 × 12"},
  ]},
 {key:"FRI", sub:"Legs", title:"Lower Body (knee-safe) + Core", meta:"5–10 min warm-up → 20–25 min strength · rest ≤45 sec",
  ex:[
   {i:"🦵",n:"Leg Press (partial depth)",c:"Shallow range only. Knees track over toes, don't let them cave.",r:"3 × 15"},
   {i:"🦵",n:"Seated Hamstring Curl",c:"Curl heels down/back, control the return.",r:"3 × 12"},
   {i:"🍑",n:"Hip Thrust / Glute Machine",c:"Drive hips up, squeeze glutes hard at the top.",r:"3 × 12"},
   {i:"🦵",n:"Hip Abductor Machine",c:"Push thighs apart through your knees, squeeze at the end.",r:"3 × 20"},
   {i:"🔥",n:"Calf Raise",c:"Rise high onto toes, pause, lower slowly.",r:"3 × 15"},
  ]},
 {key:"KNEES", sub:"Daily", title:"Daily Knee Isometrics", meta:"5–8 min · do anytime (evening before dance is ideal) · pain ≤3/10",
  ex:[
   {i:"🦿",n:"Quad Set",c:"Leg straight, press the back of your knee down, tighten thigh.",r:"5 × 10 sec / leg"},
   {i:"🧱",n:"Wall Sit (~60°)",c:"Back on wall, slide to a shallow-mid squat, hold.",r:"3 × 30–45 sec"},
   {i:"🍑",n:"Glute Bridge Hold",c:"On your back, drive hips up, squeeze, hold.",r:"3 × 30 sec"},
   {i:"🦵",n:"Straight-Leg Raise Hold",c:"Lying down, lift one straight leg ~30 cm, hold.",r:"3 × 10 sec / leg"},
   {i:"🔥",n:"Calf Raise Hold",c:"Up onto toes, hold at the top.",r:"2 × 30 sec"},
  ], iso:true},
];

const tabs = document.getElementById("tabs");
const main = document.getElementById("main");

days.forEach((d,idx)=>{
  const t=document.createElement("button");
  t.className="tab"+(idx===0?" active":"");
  t.innerHTML=`<div class="d">${d.key}</div><div class="s">${d.sub}</div>`;
  t.onclick=()=>select(idx);
  tabs.appendChild(t);

  const p=document.createElement("section");
  p.className="panel"+(idx===0?" active":"");
  let cards = d.ex.map(e=>`
    <div class="card${e.fin?' finisher':''}">
      <div class="icon">${e.i}</div>
      <div class="body">
        <div class="top"><div class="name">${e.n}</div><div class="badge">${e.r}</div></div>
        <div class="cue">${e.c}</div>
      </div>
    </div>`).join("");
  const warmBlock = d.iso ? "" : `
    <div class="warm"><div class="lbl">${warm.lbl}</div>
      <div class="big">${warm.big}</div><div class="sub">${warm.sub}</div></div>`;
  const stretchBlock = d.iso ? `
    <div class="stretch"><div class="lbl">REMINDER</div>
      <div class="big">Keep it gentle</div>
      <div class="sub">Mild discomfort is okay, sharp pain is not. If knee pain is sharp, swells, or doesn't
      ease in 2–3 weeks, see a physio.</div></div>` : `
    <div class="stretch"><div class="lbl">${stretch.lbl}</div>
      <div class="big">${stretch.big}</div><div class="sub">${stretch.sub}</div></div>`;
  p.innerHTML=`
    <div class="dayhead"><div class="bar"></div>
      <div><h2>${d.title}</h2><p>${d.meta}</p></div></div>
    ${warmBlock}${cards}${stretchBlock}`;
  main.appendChild(p);
});

function select(i){
  document.querySelectorAll(".tab").forEach((t,n)=>t.classList.toggle("active",n===i));
  document.querySelectorAll(".panel").forEach((p,n)=>p.classList.toggle("active",n===i));
  main.scrollIntoView({behavior:"smooth",block:"start"});
}
</script>
</body>
</html>
